<!doctype html>
<html lang="ja">
<head>
  <script>if (sessionStorage.getItem('left_controller_unlocked') !== '1') location.replace('/auth.html');</script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Left Controller</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/style.css?v=20260526-ctrl52" />
  <link rel="stylesheet" href="/controller-layout.css?v=20260526-ctrl52" />
</head>
<body class="controller-theme" style="background:#000;color:#fff">
  <main class="app-shell">
    <section id="controller-screen" class="controller-screen" aria-label="controller screen">
      <section class="apps-view-anchor" aria-hidden="true">
        <section class="apps-view" aria-label="apps view">
          <section class="controller-stack">
            <section id="command-grid" class="app-grid" aria-label="controller buttons"></section>
            <nav class="controller-page-nav" aria-label="page navigation">
              <button id="page-prev" class="page-arrow" type="button" aria-label="前のページ">‹</button>
              <div id="page-dots" class="controller-page-dots" aria-label="page dots"></div>
              <button id="page-next" class="page-arrow" type="button" aria-label="次のページ">›</button>
            </nav>
          </section>
        </section>
      </section>
    </section>

    <section class="debug-mini" aria-label="connection status">
      <div><strong>IP:</strong> <span id="ws-url-mini">-</span></div>
      <div><strong>WS:</strong> <span id="ws-status-mini">未接続</span></div>
    </section>

    <details class="debug-drawer">
      <summary>Debug</summary>
      <section class="debug" aria-label="debug panel">
        <div><strong>WS URL:</strong> <span id="ws-url">-</span></div>
        <div><strong>Status:</strong> <span id="ws-status">未接続</span></div>
        <div><strong>Auth:</strong> <span id="auth-status">未認証</span></div>
        <div><strong>Commands:</strong> <span id="command-count">0</span></div>
        <div><strong>Last:</strong> <span id="last-event">-</span></div>
        <button id="lock-btn" class="ghost small" type="button">ロック</button>
        <button id="clear-cache" class="ghost" type="button">キャッシュクリア</button>
      </section>
    </details>
  </main>

  <script src="/common.js?v=20260527-common1"></script>
  <script src="/controller.js?v=20260527-ctrl53"></script>
</body>
</html>
