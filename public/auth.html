<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Left Controller - Auth</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    html, body {
      background: #000 !important;
      color: #fff !important;
    }
    body.auth-theme {
      color-scheme: dark;
    }
    body.auth-theme .app-shell::before {
      background: none !important;
    }
  </style>
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="auth-theme">
  <main class="app-shell">
    <section id="auth-screen" class="auth-screen" aria-label="pin auth screen">
      <div class="auth-card">
        <h1 class="auth-title">Left Controller</h1>
        <p class="auth-subtitle">PINを入力して接続</p>
        <p id="pairing-hint" class="auth-screen-status">Mac管理画面に表示されたPINを入力してください。</p>
        <input id="pin-input" class="pin-input-main" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" />
        <button id="auth-btn" class="auth-submit" type="button">認証して開始</button>
        <p id="auth-screen-status" class="auth-screen-status">未認証</p>
      </div>
    </section>
  </main>

  <script src="/auth.js?v=20260521-authclean1"></script>
</body>
</html>
